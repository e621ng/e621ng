x-depends-on: &common-depends-on
  opensearch:
    condition: service_healthy
  memcached:
    condition: service_started
  postgres:
    condition: service_started
  redis:
    condition: service_started

services:
  e621:
    build:
      context: ./
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    user: ${DOCKER_USER:-root}
    image: e621
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - post_data:/app/public/data
      - ./docker/cron_tasks/daily:/etc/periodic/daily
    environment:
      <<: *common-env
      RAILS_ENV: development
      LOCAL_DTEXT: ${LOCAL_DTEXT:-}
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: ${DD_SERVICE:-}
      DD_ENV: ${DD_ENV:-}
    depends_on:
      <<: *common-depends-on
      autocompleted:
        condition: service_started
      iqdb:
        condition: service_started

  autocompleted:
    image: ghcr.io/e621ng/autocompleted:0.1.5
    command: /app/autocompleted
    environment:
      SERVER_ADDR: autocompleted:8118
      PG__USER: e621
      PG__HOST: postgres
      PG__PORT: 5432
      PG__DBNAME: e621_development
      PG__POOL__MAX_SIZE: 1

  nginx:
    image: nginx:stable-alpine
    volumes:
      - ./public:/app/public
      - post_data:/app/public/data
      - ./docker/default.conf.template:/etc/nginx/templates/default.conf.template
    environment:
      <<: *common-env
      NGINX_PORT: ${EXPOSED_SERVER_PORT:-3000}
      RECOMMENDER_URL: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - autocompleted
      - e621
    ports:
      - "${EXPOSED_SERVER_PORT:-3000}:${EXPOSED_SERVER_PORT:-3000}"
    
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=e621
      - POSTGRES_DB=e621_development
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${EXPOSED_POSTGRES_PORT:-34517}:5432"
  
  redis:
    image: redis:7.0.10-alpine
    command: redis-server --save 10 1 --loglevel warning
    volumes:
      - redis_data_v2:/data

  memcached:
    image: memcached:1.5.22-alpine

  opensearch:
    image: opensearchproject/opensearch:2.9.0
    environment:
      - discovery.type=single-node
      - logger.level=WARN
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      interval: 5s
      timeout: 2s
      retries: 12
      test: curl "opensearch:9200/_cluster/health?wait_for_status=yellow&timeout=2s"

  iqdb:
    image: ghcr.io/e621ng/iqdb:b988f000f17008677c7546c0c13623bc956b585d
    command: iqdb http 0.0.0.0 5588 /iqdb/e621_v2.db
    volumes:
      - iqdb_data:/iqdb
  
  datadog-agent:
    image: datadog/agent:7.52.0
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-us5.datadoghq.com}
      DD_HOSTNAME: datadog-agent
      DD_LOG_LEVEL: WARN
      DD_APM_NON_LOCAL_TRAFFIC: true
    profiles:
      - datadog

  # Discord integration

  discord_joiner:
    image: ghcr.io/e621ng/discord_joiner:fdd9563e75d6f1b2b756c032b9749199c08d9765
    environment:
      FETCH_SECRET: abc123
      URL_SECRET: super_secret_for_url_discord
      JOINER_BASE_URL: http://localhost:8000
      BOT_TOKEN: ${JOINER_BOT_TOKEN-}
      OAUTH2_CLIENT_ID: ${JOINER_OAUTH2_CLIENT_ID-}
      OAUTH2_CLIENT_SECRET: ${JOINER_OAUTH2_CLIENT_SECRET-}
      GUILD_ID: ${JOINER_GUILD_ID-}
      FAILED_JOIN_URL: ${JOINER_FAILED_JOIN_WEBHOOK_URL-}
    ports:
      - 8000:8000
    volumes:
      - discord_joiner_data:/opt/app/data
    profiles:
      - discord

  # Useful for development

  tests:
    image: e621
    environment:
      <<: *common-env
      RAILS_ENV: test
      # PARALLEL_TEST_PROCESSORS: ${PARALLEL_TEST_PROCESSORS:-4}
    volumes:
      - .:/app
      - ./docker/danbooru_local_config.rb:/app/config/danbooru_local_config.rb
      - node_modules:/app/node_modules
    depends_on:
      <<: *common-depends-on
    entrypoint: bundle exec parallel_rspec --serialize-stdout --runtime-log tmp/spec_runtime.log
    profiles:
      - tests

  bundle:
    image: e621
    environment:
      <<: *common-env
      RAILS_ENV: development
    volumes:
      - .:/app
      - ./docker/danbooru_local_config.rb:/app/config/danbooru_local_config.rb
      - node_modules:/app/node_modules
    depends_on:
      <<: *common-depends-on
    entrypoint: bundle
    profiles:
      - bundle

  rails:
    image: e621
    environment:
      <<: *common-env
      RAILS_ENV: test
    volumes:
      - .:/app
      - ./docker/danbooru_local_config.rb:/app/config/danbooru_local_config.rb
      - node_modules:/app/node_modules
    depends_on:
      <<: *common-depends-on
    entrypoint: bundle exec rails
    profiles:
      - rails

  rails_dev:
    image: e621
    environment:
      <<: *common-env
      RAILS_ENV: development
    volumes:
      - .:/app
      - ./docker/danbooru_local_config.rb:/app/config/danbooru_local_config.rb
      - node_modules:/app/node_modules
    depends_on:
      <<: *common-depends-on
    entrypoint: bundle exec rails
    profiles:
      - rails_dev

  rubocop:
    image: e621
    volumes:
      - .:/app
      - rubocop_cache:/rubocop_cache
    entrypoint: bundle exec rubocop --cache-root /rubocop_cache
    profiles: 
      - rubocop

  linter:
    image: e621
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    entrypoint: npm run lint
    profiles: 
      - linter

volumes:
  post_data:
  iqdb_data:
  opensearch_data:
  db_data:
  redis_data_v2:
  node_modules:
  rubocop_cache:
  discord_joiner_data:
