name: 4. Deploy

on:
  release:
    types: [published, released]

# Never cancel an in-progress deploy — do not leave servers mid-update
concurrency:
  group: deploy-${{ github.event.release.prerelease && 'e926' || 'e621' }}
  cancel-in-progress: false

jobs:
  # Triggered when a pre-release is published — deploys to e926
  deploy-e926:
    name: Deploy to e926
    runs-on: ubuntu-22.04
    if: github.event.action == 'published' && github.event.release.prerelease
    environment: e926

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          TAG: ${{ github.event.release.tag_name }}
          HOST: ${{ vars.E926_HOST }}
        run: ssh e621@$HOST /app/bin/deploy "$TAG"

  # Triggered when a release is finalized (pre-release unchecked, or full release published
  # directly) — deploys to e621 production servers in rolling order: app4 → app2 → app3.
  # Migrations run on app4 only, before the rolling restart begins.
  deploy-e621:
    name: Deploy to e621
    runs-on: ubuntu-22.04
    if: github.event.action == 'released'
    environment: e621

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy to app4 (runs migrations)
        env:
          TAG: ${{ github.event.release.tag_name }}
          HOST: ${{ vars.PROD_APP4_HOST }}
        run: ssh e621@$HOST /app/bin/deploy "$TAG" --migrate

      - name: Deploy to app2
        env:
          TAG: ${{ github.event.release.tag_name }}
          HOST: ${{ vars.PROD_APP2_HOST }}
        run: ssh e621@$HOST /app/bin/deploy "$TAG"

      - name: Deploy to app3
        env:
          TAG: ${{ github.event.release.tag_name }}
          HOST: ${{ vars.PROD_APP3_HOST }}
        run: ssh e621@$HOST /app/bin/deploy "$TAG"
