# Language labels
'Lang: Ruby':
  - changed-files:
    - any-glob-to-any-file: '**/*.rb'

'Lang: JS':
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.js'
      - '**/*.ts'

'Lang: Vue':
  - changed-files:
    - any-glob-to-any-file: '**/*.vue'

'Lang: CSS':
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.css'
      - '**/*.scss'
      - '**/*.sass'

'Lang: HTML':
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.html'
      - '**/*.html.erb'

'Lang: SQL':
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.sql'
      - 'db/migrate/**'
      - 'db/schema.rb'

# CI/CD & tooling
CI/CD:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - 'Procfile*'
      - '.env.sample'

Rubocop:
  - changed-files:
    - any-glob-to-any-file:
      - '.rubocop*.yml'

'Type: Dependencies':
  - changed-files:
    - any-glob-to-any-file:
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'package.json'
      - 'yarn.lock'
      - 'package-lock.json'

